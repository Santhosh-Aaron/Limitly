# Render Blueprint — deploy with "New → Blueprint" on render.com
services:
  - type: web
    name: limitly-backend
    runtime: docker
    dockerfilePath: ./limitly/Dockerfile
    dockerContext: ./limitly
    region: oregon
    plan: free
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MS
        value: "86400000"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: APP_DEV_MODE
        value: "false"
