# Server Port — Render sets PORT env var automatically
server.port=${PORT:8080}

# Application Name
spring.application.name=limitly

# PostgreSQL Database Connection
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/limitly}
spring.datasource.username=${DB_USERNAME:limitly_admin}
spring.datasource.password=${DB_PASSWORD:limitly_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

